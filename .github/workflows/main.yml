name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libffi-dev python3-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev tk-dev \
          libgdbm-dev libc6-dev libbz2-dev libffi-dev cython3 autoconf libtool \
          pkg-config cmake ant openjdk-17-jdk libtinfo6

      - name: Install Buildozer
        run: |
          pip install --user buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Accept Android Licenses (The Fix)
        run: |
          # اینڈرائیڈ ٹولز انسٹال کرنا اور لائسنسز کو زبردستی قبول کرنا
          yes | buildozer android debug --log_level=2 || true
          # اگر اوپر والا رک جائے تو یہ کمانڈ لائسنسز کو پکا کر دے گی
          sdk_path=$(find $HOME/.buildozer -name "sdkmanager" | head -n 1)
          if [ -f "$sdk_path" ]; then
            yes | $sdk_path --licenses
          fi

      - name: Final Build
        run: |
          # اب اصل بلڈ شروع ہوگی
          buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: bin/*.apk
