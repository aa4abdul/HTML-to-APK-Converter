
title = HTML to APK Converter

# (str) Package name
package.name = html_apk_tool

# (str) Package domain (needed for android packaging)
package.domain = org.dev

# (str) Source code where the main.py lives
source.dir = .

# (list) Source files to include (let empty to include all the files)
source.include_exts = py,png,jpg,kv,atlas,html,js,css

# (str) Application version
version = 1.0

# (list) Application requirements
# یہاں وہ لائبریریز ہیں جو ایپ کو چلانے کے لیے ضروری ہیں
requirements = python3,kivy==2.2.1,kivymd==1.1.1,requests,urllib3,certifi

# (str) Supported orientations
orientation = portrait

# (bool) Indicate if the application should be fullscreen
fullscreen = 1

# (list) Permissions
# انٹرنیٹ کی اجازت لازمی ہے تاکہ فائر بیس کام کر سکے
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE, READ_EXTERNAL_STORAGE

# (int) Android API to use (31 is for Android 12)
android.api = 31

# (int) Minimum API your APK will support
android.minapi = 21

# (str) Android arch to build for
android.archs = arm64-v8a, armeabi-v7a

# (bool) Skip byte compile for .py files
android.skip_byte_compile = 1

# (list) List of service to declare
services = 

# (str) Android logcat filters to use
android.logcat_filters = *:S python:D

# (bool) Copy library instead of making a libpython.so
android.copy_libs = 1

[buildozer]
# (int) Log level (0 = error only, 1 = info, 2 = debug (with command output))
log_level = 2

# (int) Display warning if buildozer is run as root (0 = off, 1 = on)
warn_on_root = 1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: My-Generated-App
          path: bin/*.apk
          
