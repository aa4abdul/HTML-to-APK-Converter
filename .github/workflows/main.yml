name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          # ہم نے یہاں سے libtinfo5 ہٹا کر libtinfo6 کر دیا ہے جو نئے سسٹم کے لیے ہے
          sudo apt install -y build-essential libffi-dev python3-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev tk-dev \
          libgdbm-dev libc6-dev libbz2-dev libffi-dev cython3 autoconf libtool \
          pkg-config cmake ant openjdk-17-jdk libtinfo6

      - name: Install Buildozer
        run: |
          pip install --user buildozer
          pip install --user cython
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Android APK
        run: |
          # اینڈرائیڈ لائسنس قبول کرنا اور بلڈ شروع کرنا
          yes | buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-Package
          path: bin/*.apk
