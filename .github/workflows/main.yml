name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev tk-dev libgdbm-dev \
          libc6-dev libbz2-dev libffi-dev autoconf libtool pkg-config cmake ant \
          openjdk-17-jdk unzip zip

      - name: Install Buildozer & Cython
        run: |
          pip install --user "Cython==0.29.33" virtualenv buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Android APK
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # یہ کمانڈ سارا لاگ ایک فائل میں محفوظ کرے گی، اور فیل ہونے کی صورت میں صرف آخری 100 لائنیں دکھائے گی
          yes y | buildozer android debug > build.log 2>&1 || (echo "=== ERROR LOG ===" && tail -n 100 build.log && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HTML-to-APK-App
          path: bin/*.apk
