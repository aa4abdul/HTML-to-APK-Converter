name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev tk-dev libgdbm-dev \
          libc6-dev libbz2-dev libffi-dev autoconf libtool pkg-config cmake ant \
          openjdk-17-jdk unzip zip

      - name: Install Buildozer & Fix Cython
        run: |
          # سب سے اہم لائن: Cython کا مخصوص ورژن ڈاؤن لوڈ کرنا
          pip install --user "Cython==0.29.33" virtualenv buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download SDK and Accept Licenses
        run: |
          # یہ کمانڈ صرف اینڈرائیڈ SDK ڈاؤن لوڈ کرے گی اور لائسنس کے لیے رکے گی
          buildozer android debug || true
          
          # یہ کمانڈ خودکار طریقے سے تمام لائسنسز کو "Yes" کر دے گی
          find ~/.buildozer -name "sdkmanager" -exec sh -c 'yes | "$1" --licenses' _ {} \; || true

      - name: Final Build APK
        run: |
          # اب چونکہ لائسنسز قبول ہو چکے ہیں اور Cython بھی ٹھیک ہے، یہ 100% بلڈ کرے گا
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HTML-to-APK-App
          path: bin/*.apk
