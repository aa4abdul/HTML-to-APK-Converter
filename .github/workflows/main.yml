name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # اس سے آپ مینوئل بھی رن کر سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.9'

      - name: Install Buildozer Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev \
          libssl-dev zlib1g-dev libncurses5-dev libncursesw5-dev \
          libreadline-dev libsqlite3-dev tk-dev libgdbm-dev \
          libc6-dev libbz2-dev libffi-dev cython3

      - name: Build with Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        id: buildozer
        with:
          buildozer_version: master
          python_version: 3.9

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: My-Generated-App
          path: bin/*.apk
          
