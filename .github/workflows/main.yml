name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev python3-dev libssl-dev zlib1g-dev \
          libncurses5-dev libncursesw5-dev libreadline-dev libsqlite3-dev tk-dev libgdbm-dev \
          libc6-dev libbz2-dev libffi-dev cython3 autoconf libtool pkg-config cmake ant \
          openjdk-17-jdk unzip zip

      - name: Install Buildozer
        run: |
          pip install --user --upgrade buildozer cython virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build Android APK
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # یہ ٹرک "Broken pipe" کے ایرر کو نظر انداز کر کے کام جاری رکھے گی
          yes "y" | buildozer android debug || true

      - name: Verify APK Success
        run: |
          if ls bin/*.apk 1> /dev/null 2>&1; then
            echo "Congratulations! APK successfully built!"
          else
            echo "Error: APK not found. There is an issue in the python code or buildozer.spec"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HTML-to-APK-App
          path: bin/*.apk
